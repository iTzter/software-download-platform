<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة تحميل البرامج</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>📥 منصة تحميل البرامج</h1>
        <p>أحدث البرامج والتعريفات بسهولة</p>
      </div>
    </header>

    <!-- Login Section (Initial) -->
    <div id="loginSection" class="modal-overlay">
      <div class="modal">
        <h2>الدخول إلى المنصة</h2>
        <p>أدخل كود الدعوة الخاص بك</p>
        <input type="text" id="invitationCode" placeholder="كود الدعوة" maxlength="8">
        <button onclick="verifyCode()">التحقق</button>
        <p id="loginError" class="error"></p>
      </div>
    </div>

    <!-- Main Content (After Login) -->
    <main id="mainContent" class="hidden">
      <!-- Navigation -->
      <nav class="nav">
        <div class="nav-content">
          <button class="nav-btn active" onclick="filterByCategory('all')">الكل</button>
          <div id="categoryButtons"></div>
        </div>
        <button class="support-btn" onclick="openTicketForm()">🎫 الدعم الفني</button>
      </nav>

      <!-- Software Grid -->
      <section class="software-grid">
        <div id="softwareList" class="grid"></div>
      </section>

      <!-- Logout Button -->
      <div class="logout-container">
        <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
      </div>
    </main>

    <!-- Ticket Form Modal -->
    <div id="ticketModal" class="modal-overlay hidden">
      <div class="modal">
        <span class="close" onclick="closeTicketForm()">&times;</span>
        <h2>نموذج الدعم الفني</h2>
        <input type="text" id="ticketTitle" placeholder="عنوان المشكلة" required>
        <textarea id="ticketDescription" placeholder="وصف المشكلة بالتفصيل" rows="5" required></textarea>
        <button onclick="submitTicket()">إرسال</button>
        <p id="ticketError" class="error"></p>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
