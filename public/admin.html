<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم الإدارية</title>
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
  <div class="admin-container">
    <!-- Login Section -->
    <div id="adminLogin" class="login-section">
      <div class="login-box">
        <h1>🔐 لوحة التحكم</h1>
        <input type="text" id="adminUsername" placeholder="اسم المستخدم">
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button onclick="adminLogin()">دخول</button>
        <p id="loginError" class="error"></p>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="dashboard hidden">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>🎛️ التحكم</h2>
        <nav class="admin-nav">
          <button class="admin-nav-btn active" onclick="switchTab('categories')">📁 الفئات</button>
          <button class="admin-nav-btn" onclick="switchTab('software')">💻 البرامج</button>
          <button class="admin-nav-btn" onclick="switchTab('invitations')">🎫 أكواد الدعوة</button>
          <button class="admin-nav-btn" onclick="switchTab('tickets')">📧 الدعاوي</button>
          <button class="logout-btn" onclick="adminLogout()">تسجيل خروج</button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="admin-main">
        <!-- Categories Tab -->
        <section id="categoriesTab" class="tab active">
          <h2>إدارة الفئات</h2>
          <div class="form-section">
            <input type="text" id="categoryName" placeholder="اسم الفئة">
            <textarea id="categoryDesc" placeholder="وصف الفئة" rows="3"></textarea>
            <button onclick="createCategory()">+ إضافة فئة</button>
          </div>
          <div id="categoriesList" class="items-list"></div>
        </section>

        <!-- Software Tab -->
        <section id="softwareTab" class="tab hidden">
          <h2>إدارة البرامج</h2>
          <div class="form-section">
            <input type="text" id="softwareName" placeholder="اسم البرنامج">
            <textarea id="softwareDesc" placeholder="وصف البرنامج" rows="3"></textarea>
            <input type="text" id="softwareVersion" placeholder="رقم الإصدار">
            <select id="softwareCategory">
              <option value="">-- اختر الفئة --</option>
            </select>
            <input type="text" id="softwareUrl" placeholder="رابط التحميل">
            <input type="text" id="softwareSize" placeholder="حجم الملف (مثال: 250 MB)">
            <input type="text" id="softwareTags" placeholder="الوسوم (مفصولة بفواصل)">
            <button onclick="createSoftware()">+ إضافة برنامج</button>
          </div>
          <div id="softwareList" class="items-list"></div>
        </section>

        <!-- Invitations Tab -->
        <section id="invitationsTab" class="tab hidden">
          <h2>إدارة أكواد الدعوة</h2>
          <div class="form-section">
            <label>مدة صلاحية الكود (بالأيام)</label>
            <input type="number" id="codeDuration" placeholder="مثال: 30" min="1" value="30">
            <button onclick="generateCode()">+ إنشاء كود</button>
          </div>
          <div id="invitationsList" class="items-list"></div>
        </section>

        <!-- Tickets Tab -->
        <section id="ticketsTab" class="tab hidden">
          <h2>إدارة الدعاوي</h2>
          <div id="ticketsList" class="items-list"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
